<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="auth-page">

    <div class="left signup-left">

        <h1>Join Us</h1>

        <p>
            Build AI-powered customer experiences
            with enterprise-grade automation.
        </p>

    </div>

    <div class="right">

        <div class="card">

            <h2>Create Account</h2>

            <p>Start your journey</p>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/signup">

                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Sign Up
                </button>

            </form>

            <div class="link">
                Already have an account?
                <a href="/login">Login</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
